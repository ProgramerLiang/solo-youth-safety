import groovy.json.JsonSlurper
import java.util.Properties

apply plugin: 'com.android.application'

def frontendPackage = new JsonSlurper().parse(file('../../package.json'))
def appVersionName = (frontendPackage.version ?: '0.2.0').toString()
def versionTokens = appVersionName.tokenize('.').collect { token ->
    token.isInteger() ? token.toInteger() : 0
}
while (versionTokens.size() < 3) {
    versionTokens << 0
}
def appVersionCode = (versionTokens[0] * 10000) + (versionTokens[1] * 100) + versionTokens[2]
def apkBaseName = "solo-youth-safety-v${appVersionName}"
def defaultSigningDir = new File(System.getProperty('user.home'), '.solo-youth-safety/signing')
def signingPropertiesPath = System.getenv('SAFETY_SIGNING_PROPERTIES_FILE') ?: new File(defaultSigningDir, 'release-signing.properties').absolutePath

def signingPropertiesFile = file(signingPropertiesPath)
def releaseSigning = new Properties()
def hasReleaseSigning = signingPropertiesFile.exists()
def releaseTaskRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains('release')
}

def requireSigningProperty = { String key ->
    def value = releaseSigning.getProperty(key)
    if (!value) {
        throw new GradleException("Missing signing property '${key}' in ${signingPropertiesFile}")
    }
    value
}

if (hasReleaseSigning) {
    signingPropertiesFile.withInputStream { stream ->
        releaseSigning.load(stream)
    }
}

if (releaseTaskRequested && !hasReleaseSigning) {
    throw new GradleException(
        "Release signing config not found at ${signingPropertiesFile}. " +
        "Run 'npm run android:release:setup-signing' in frontend first, or set SAFETY_SIGNING_PROPERTIES_FILE."
    )
}

android {
    namespace "com.solo.youth.safety"
    compileSdk rootProject.ext.compileSdkVersion

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(requireSigningProperty('storeFile'))
                storePassword requireSigningProperty('storePassword')
                keyAlias requireSigningProperty('keyAlias')
                keyPassword requireSigningProperty('keyPassword')
            }
        }
    }

    defaultConfig {
        applicationId "com.solo.youth.safety"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "${apkBaseName}-${variant.name}.apk"
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
